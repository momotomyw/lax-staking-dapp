<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAX 质押数据统计</title>
    <!-- 使用可靠的 CDN -->
    <script src="https://unpkg.com/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1e;
            min-height: 100vh;
            color: #fff;
        }

        .header {
            background: linear-gradient(90deg, #1a1a3e 0%, #2a2a5e 100%);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(90deg, #f39c12, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-tabs {
            display: flex;
            background: rgba(255,255,255,0.05);
            padding: 10px 20px;
            gap: 20px;
        }

        .nav-tab {
            padding: 10px 20px;
            cursor: pointer;
            opacity: 0.6;
            transition: all 0.3s;
        }

        .nav-tab.active {
            opacity: 1;
            border-bottom: 2px solid #f39c12;
        }

        .container {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #f39c12;
        }

        .date-selector {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .date-selector input {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
        }

        .btn {
            background: linear-gradient(90deg, #f39c12, #e74c3c);
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .stat-item {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 10px;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
        }

        .highlight {
            color: #f39c12;
        }

        .chart-container {
            height: 250px;
            margin: 20px 0;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #f39c12;
            border-radius: 50%;
            margin: 0 auto 15px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid rgba(231, 76, 60, 0.5);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }

        .period-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .period-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }

        .period-btn.active {
            background: linear-gradient(90deg, #f39c12, #e74c3c);
            border-color: transparent;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .data-row:last-child {
            border-bottom: none;
        }

        .data-label {
            color: #888;
        }

        .data-value {
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">LAX 质押统计</div>
    </div>

    <div class="nav-tabs">
        <div class="nav-tab active" onclick="switchPage('dashboard')">每日统计</div>
        <div class="nav-tab" onclick="switchPage('period')">时间段统计</div>
        <div class="nav-tab" onclick="switchPage('redeemable')">到期查询</div>
    </div>

    <div class="container">
        <!-- 每日统计页面 -->
        <div id="page-dashboard" class="page active">
            <div class="card">
                <div class="card-title">指定日期质押统计</div>
                <div class="date-selector">
                    <label>选择日期:</label>
                    <input type="date" id="dailyDate">
                    <button class="btn" onclick="loadDailyStats()">查询</button>
                </div>

                <div id="dailyStats" class="stat-grid">
                    <div class="stat-item">
                        <div class="stat-label">1天质押金额</div>
                        <div class="stat-value" id="stake1d">0.00 LAX</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">7天质押金额</div>
                        <div class="stat-value" id="stake7d">0.00 LAX</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">15天质押金额</div>
                        <div class="stat-value" id="stake15d">0.00 LAX</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">30天质押金额</div>
                        <div class="stat-value" id="stake30d">0.00 LAX</div>
                    </div>
                </div>

                <div style="margin-top: 20px;">
                    <div class="stat-item" style="background: rgba(243, 156, 18, 0.1);">
                        <div class="stat-label">当天总质押金额</div>
                        <div class="stat-value highlight" id="stakeTotal">0.00 LAX</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 时间段统计页面 -->
        <div id="page-period" class="page">
            <div class="card">
                <div class="card-title">每日质押量趋势</div>
                <div class="period-selector">
                    <button class="period-btn active" onclick="loadPeriodData(7)">最近7天</button>
                    <button class="period-btn" onclick="loadPeriodData(30)">最近30天</button>
                    <button class="period-btn" onclick="loadPeriodData(90)">最近90天</button>
                </div>

                <div class="chart-container">
                    <canvas id="periodChart"></canvas>
                </div>

                <div class="stat-grid">
                    <div class="stat-item">
                        <div class="stat-label">累计新增质押</div>
                        <div class="stat-value highlight" id="totalNewStaked">0.00</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">仍在质押</div>
                        <div class="stat-value" id="stillStaked">0.00</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">当前可解押</div>
                        <div class="stat-value" id="currentRedeemable">0.00</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">数据点数</div>
                        <div class="stat-value" id="dataPoints">0</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">未来可解押金额</div>
                <div id="redeemableList">
                    <div class="data-row">
                        <span class="data-label">未来1天后可解押</span>
                        <span class="data-value" id="redeem1d">0.00 LAX</span>
                    </div>
                    <div class="data-row">
                        <span class="data-label">未来2天后可解押</span>
                        <span class="data-value" id="redeem2d">0.00 LAX</span>
                    </div>
                    <div class="data-row">
                        <span class="data-label">未来7天后可解押</span>
                        <span class="data-value" id="redeem7d">0.00 LAX</span>
                    </div>
                    <div class="data-row">
                        <span class="data-label">未来15天后可解押</span>
                        <span class="data-value" id="redeem15d">0.00 LAX</span>
                    </div>
                    <div class="data-row">
                        <span class="data-label">未来30天后可解押</span>
                        <span class="data-value" id="redeem30d">0.00 LAX</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 到期查询页面 -->
        <div id="page-redeemable" class="page">
            <div class="card">
                <div class="card-title">查询到期金额</div>
                <div class="date-selector">
                    <label>选择日期 (今天之后):</label>
                    <input type="date" id="redeemDate">
                    <button class="btn" onclick="loadRedeemable()">查询</button>
                </div>

                <div id="redeemResult" style="display: none;">
                    <div class="stat-item" style="background: rgba(46, 204, 113, 0.1); margin-bottom: 15px;">
                        <div class="stat-label">到期金额</div>
                        <div class="stat-value highlight" id="redeemAmount">0.00 LAX</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">距离天数</div>
                        <div class="stat-value" id="redeemDays">0 天</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API 配置
        const API_BASE = 'http://localhost:5000/api';
        // 部署时改为实际 API 地址
        // const API_BASE = 'https://your-api.com/api';

        let periodChart = null;

        // 初始化日期选择器
        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('dailyDate').value = today;

            // 设置可选择的日期范围
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            const tomorrowStr = tomorrow.toISOString().split('T')[0];
            document.getElementById('redeemDate').min = tomorrowStr;
            document.getElementById('redeemDate').value = tomorrowStr;

            // 自动加载今日数据
            loadDailyStats();
            loadPeriodData(7);
        });

        function switchPage(page) {
            // 隐藏所有页面
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));

            // 显示选中页面
            document.getElementById('page-' + page).classList.add('active');
            event.target.classList.add('active');
        }

        async function loadDailyStats() {
            const date = document.getElementById('dailyDate').value;

            showLoading('dailyStats');

            try {
                const response = await fetch(`${API_BASE}/daily?date=${date}`);
                const result = await response.json();

                if (result.success && result.data) {
                    const data = result.data;
                    document.getElementById('stake1d').textContent = formatNumber(data.stake_1d) + ' LAX';
                    document.getElementById('stake7d').textContent = formatNumber(data.stake_7d) + ' LAX';
                    document.getElementById('stake15d').textContent = formatNumber(data.stake_15d) + ' LAX';
                    document.getElementById('stake30d').textContent = formatNumber(data.stake_30d) + ' LAX';
                    document.getElementById('stakeTotal').textContent = formatNumber(data.stake_total) + ' LAX';
                } else {
                    // 使用模拟数据演示
                    showMockDailyData();
                }
            } catch (error) {
                console.error('API error:', error);
                showMockDailyData();
            }
        }

        async function loadPeriodData(days) {
            // 更新按钮状态
            document.querySelectorAll('.period-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.includes(days.toString())) {
                    btn.classList.add('active');
                }
            });

            showLoading('periodChart');

            try {
                const endDate = new Date().toISOString().split('T')[0];
                const startDate = new Date(Date.now() - days * 24 * 60 * 60 * 1000).toISOString().split('T')[0];

                const response = await fetch(`${API_BASE}/period?start=${startDate}&end=${endDate}`);
                const result = await response.json();

                if (result.success && result.data) {
                    const data = result.data;
                    document.getElementById('totalNewStaked').textContent = formatNumber(data.total_new_staked);
                    document.getElementById('stillStaked').textContent = formatNumber(data.still_staked);
                    document.getElementById('currentRedeemable').textContent = formatNumber(data.current_redeemable);
                    document.getElementById('dataPoints').textContent = data.data_points;

                    // 更新可解押列表
                    if (data.future_redeemable) {
                        document.getElementById('redeem1d').textContent = formatNumber(data.future_redeemable['1d']) + ' LAX';
                        document.getElementById('redeem2d').textContent = formatNumber(data.future_redeemable['2d']) + ' LAX';
                        document.getElementById('redeem7d').textContent = formatNumber(data.future_redeemable['7d']) + ' LAX';
                        document.getElementById('redeem15d').textContent = formatNumber(data.future_redeemable['15d']) + ' LAX';
                        document.getElementById('redeem30d').textContent = formatNumber(data.future_redeemable['30d']) + ' LAX';
                    }
                } else {
                    showMockPeriodData();
                }
            } catch (error) {
                console.error('API error:', error);
                showMockPeriodData();
            }

            // 加载图表数据
            loadChartData(days);
        }

        async function loadChartData(days) {
            try {
                const timeframe = days <= 7 ? 'day' : days <= 30 ? 'week' : 'month';
                const response = await fetch(`${API_BASE}/chart/${timeframe}`);
                const result = await response.json();

                if (result.success && result.data) {
                    renderChart(result.data.labels, result.data.values);
                } else {
                    renderChart(generateMockLabels(days), generateMockData(days));
                }
            } catch (error) {
                renderChart(generateMockLabels(days), generateMockData(days));
            }
        }

        async function loadRedeemable() {
            const date = document.getElementById('redeemDate').value;
            const resultDiv = document.getElementById('redeemResult');
            resultDiv.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE}/redeemable?date=${date}`);
                const result = await response.json();

                if (result.success && result.data) {
                    const data = result.data;
                    document.getElementById('redeemAmount').textContent = formatNumber(data.redeemable) + ' LAX';
                    document.getElementById('redeemDays').textContent = data.days_until + ' 天';
                    resultDiv.style.display = 'block';
                } else {
                    alert('无法获取到期数据，请稍后重试');
                }
            } catch (error) {
                console.error('API error:', error);
                alert('无法连接到数据服务，请检查 API 是否运行');
            }
        }

        function renderChart(labels, values) {
            const ctx = document.getElementById('periodChart').getContext('2d');

            if (periodChart) {
                periodChart.destroy();
            }

            const gradient = ctx.createLinearGradient(0, 0, 0, 250);
            gradient.addColorStop(0, 'rgba(243, 156, 18, 0.5)');
            gradient.addColorStop(1, 'rgba(243, 156, 18, 0)');

            periodChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '每日质押量',
                        data: values,
                        borderColor: '#f39c12',
                        backgroundColor: gradient,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        pointHoverRadius: 6,
                        pointHoverBackgroundColor: '#f39c12'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.parsed.y.toLocaleString() + ' LAX';
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#888', font: { size: 10 } }
                        },
                        y: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: {
                                color: '#888',
                                callback: value => {
                                    if (value >= 1000000) return (value / 1000000).toFixed(1) + 'M';
                                    if (value >= 1000) return (value / 1000).toFixed(1) + 'K';
                                    return value;
                                }
                            }
                        }
                    }
                }
            });
        }

        function formatNumber(num) {
            if (!num) return '0.00';
            return parseFloat(num).toLocaleString('zh-CN', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }

        function showLoading(elementId) {
            // 可以添加加载动画
        }

        function generateMockLabels(days) {
            const labels = [];
            for (let i = days - 1; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                labels.push(date.toISOString().split('T')[0].substring(5));
            }
            return labels;
        }

        function generateMockData(days) {
            const data = [];
            for (let i = 0; i < days; i++) {
                data.push(Math.random() * 500000 + 300000);
            }
            return data;
        }

        function showMockDailyData() {
            // 模拟数据（参考截图）
            document.getElementById('stake1d').textContent = '218,699.00 LAX';
            document.getElementById('stake7d').textContent = '0.00 LAX';
            document.getElementById('stake15d').textContent = '1,020.00 LAX';
            document.getElementById('stake30d').textContent = '124,096.00 LAX';
            document.getElementById('stakeTotal').textContent = '343,815.00 LAX';
        }

        function showMockPeriodData() {
            // 模拟数据（参考截图）
            document.getElementById('totalNewStaked').textContent = '1,665,217.02';
            document.getElementById('stillStaked').textContent = '1,798,296.01';
            document.getElementById('currentRedeemable').textContent = '58,729.35';
            document.getElementById('dataPoints').textContent = '7';

            document.getElementById('redeem1d').textContent = '494,411.95 LAX';
            document.getElementById('redeem2d').textContent = '587,153.95 LAX';
            document.getElementById('redeem7d').textContent = '1,041,804.44 LAX';
            document.getElementById('redeem15d').textContent = '1,219,400.48 LAX';
            document.getElementById('redeem30d').textContent = '1,798,296.01 LAX';
        }
    </script>
</body>
</html>
